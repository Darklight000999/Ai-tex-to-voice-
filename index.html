<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Battle Editor 5.0</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}

body{
height:100vh;
background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#1c1c1c);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.app{
width:95%;
max-width:1300px;
height:92vh;
display:flex;
border-radius:20px;
overflow:hidden;
backdrop-filter:blur(20px);
box-shadow:0 0 50px rgba(0,0,0,0.6);
}

.sidebar{
width:320px;
background:rgba(255,255,255,0.06);
padding:20px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar h2{
margin-bottom:15px;
color:cyan;
}

.sidebar input,
.sidebar select,
.sidebar textarea{
width:100%;
margin-bottom:10px;
padding:8px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.12);
color:white;
}

.sidebar textarea{height:60px;resize:none}

.btn{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:12px;
border:none;
font-weight:bold;
cursor:pointer;
transition:all .3s ease;
background:linear-gradient(90deg,cyan,blue);
color:white;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,255,255,0.4);
}

.stage-container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:black;
position:relative;
}

#stage{
width:90%;
height:85%;
border-radius:20px;
background:#000;
position:relative;
overflow:hidden;
box-shadow:0 0 40px rgba(0,0,0,0.8);
}

.layer{
position:absolute;
font-weight:bold;
cursor:move;
user-select:none;
resize:both;
overflow:auto;
min-width:50px;
min-height:30px;
}

.layer:hover{transform:scale(1.05)}

/* Effects */

.neon{text-shadow:0 0 10px cyan,0 0 30px cyan;}
.fire{text-shadow:0 0 10px red,0 0 30px orange;}
.rainbow{
background:linear-gradient(90deg,red,orange,yellow,green,blue,violet);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.pulse{animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:0.5}}
.rotate{animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.bounce{animation:bounce 1s infinite}
@keyframes bounce{50%{transform:translateY(-20px)}}
.glitch{animation:glitch .3s infinite}
@keyframes glitch{
0%{transform:translate(1px,1px)}
50%{transform:translate(-1px,-1px)}
100%{transform:translate(1px,-1px)}
}
.stroke{-webkit-text-stroke:2px black;}

@media(max-width:900px){
.app{flex-direction:column}
.sidebar{width:100%;height:300px}
.stage-container{height:calc(100% - 300px)}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<h2>AI Battle Controls</h2>

<textarea id="text" placeholder="Enter Text"></textarea>
<input type="number" id="size" value="60">
<input type="color" id="color" value="#00ffff">

<select id="effect">
<option value="">Normal</option>
<option value="neon">Neon</option>
<option value="fire">Fire</option>
<option value="rainbow">Rainbow</option>
<option value="pulse">Pulse</option>
<option value="rotate">Rotate</option>
<option value="bounce">Bounce</option>
<option value="glitch">Glitch</option>
<option value="stroke">Stroke</option>
</select>

<button class="btn" onclick="addLayer()">Add Layer</button>
<button class="btn" onclick="startSpeech()">Speech → Text</button>
<button class="btn" onclick="recordVoice()">Record Voice</button>
<button class="btn" onclick="exportVideo()">Export Video</button>
<button class="btn" onclick="saveProject()">Save Project</button>

<input type="file" accept="image/*,video/*" onchange="setBG(event)">
<input type="file" accept="audio/*" onchange="setMusic(event)">
</div>

<div class="stage-container">
<div id="stage"></div>
</div>

</div>

<audio id="music"></audio>

<script>
let layers=[];
let audioCtx, analyser, dataArray;

function addLayer(){
let l={
text:text.value,
size:size.value,
color:color.value,
effect:effect.value,
x:100,y:100
};
layers.push(l);
render();
}

function render(){
stage.innerHTML="";
layers.forEach(l=>{
let div=document.createElement("div");
div.className="layer "+l.effect;
div.innerText=l.text;
div.style.fontSize=l.size+"px";
div.style.color=l.color;
div.style.left=l.x+"px";
div.style.top=l.y+"px";
drag(div,l);
stage.appendChild(div);
});
}

function drag(el,l){
el.onmousedown=e=>{
let ox=e.clientX-el.offsetLeft;
let oy=e.clientY-el.offsetTop;
document.onmousemove=e=>{
el.style.left=e.clientX-ox+"px";
el.style.top=e.clientY-oy+"px";
l.x=el.offsetLeft;
l.y=el.offsetTop;
}
document.onmouseup=()=>document.onmousemove=null;
}
}

function startSpeech(){
let rec=new(window.SpeechRecognition||webkitSpeechRecognition)();
rec.lang="en-US";
rec.start();
rec.onresult=e=>{
text.value=e.results[0][0].transcript;
addLayer();
};
}

function recordVoice(){
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
let recorder=new MediaRecorder(stream);
recorder.start();
setTimeout(()=>recorder.stop(),5000);
recorder.ondataavailable=e=>{
music.src=URL.createObjectURL(e.data);
music.play();
}
});
}

function setMusic(e){
music.src=URL.createObjectURL(e.target.files[0]);
music.play();
audioCtx=new AudioContext();
let src=audioCtx.createMediaElementSource(music);
analyser=audioCtx.createAnalyser();
src.connect(analyser);
analyser.connect(audioCtx.destination);
analyser.fftSize=64;
dataArray=new Uint8Array(analyser.frequencyBinCount);
beatLoop();
}

function beatLoop(){
if(!analyser)return;
requestAnimationFrame(beatLoop);
analyser.getByteFrequencyData(dataArray);
let avg=dataArray.reduce((a,b)=>a+b)/dataArray.length;
document.querySelectorAll(".layer").forEach(el=>{
el.style.transform="scale("+(1+avg/500)+")";
});
}

function setBG(e){
let file=e.target.files[0];
if(file.type.startsWith("video")){
let v=document.createElement("video");
v.src=URL.createObjectURL(file);
v.autoplay=true;v.loop=true;v.muted=true;
v.style.width="100%";v.style.height="100%";
stage.innerHTML="";
stage.appendChild(v);
}else{
let r=new FileReader();
r.onload=()=>stage.style.backgroundImage=`url(${r.result})`;
r.readAsDataURL(file);
}
}

function exportVideo(){
let stream=stage.captureStream(60);
let rec=new MediaRecorder(stream);
let chunks=[];
rec.ondataavailable=e=>chunks.push(e.data);
rec.onstop=()=>{
let blob=new Blob(chunks,{type:"video/webm"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="AI-Battle-Final.webm";
a.click();
};
rec.start();
setTimeout(()=>rec.stop(),8000);
}

function saveProject(){
let blob=new Blob([JSON.stringify(layers)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="project.json";
a.click();
}
</script>

</body>
</html>
