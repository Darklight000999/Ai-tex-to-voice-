<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rectangle Typography Generator</title>

<style>
body{
background:#111;
font-family:sans-serif;
color:white;
text-align:center;
margin:0;
padding:20px;
}

/* Control Area */
.controls{
margin-bottom:20px;
}

input,select,button{
padding:8px;
margin:5px;
font-size:14px;
}

/* Rectangle Video Area */
#videoBox{
width:800px;
height:300px;
margin:0 auto;
background:black;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
position:relative;
}

/* Animated Text */
#animatedText{
font-size:60px;
font-weight:bold;
opacity:0;
position:absolute;
}

/* Animations */

.fadeIn{
animation:fadeIn 1s forwards;
}

.slideUp{
animation:slideUp 1s forwards;
}

.zoomIn{
animation:zoomIn 1s forwards;
}

.rotateIn{
animation:rotateIn 1s forwards;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@keyframes slideUp{
from{transform:translateY(100px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

@keyframes zoomIn{
from{transform:scale(0);opacity:0;}
to{transform:scale(1);opacity:1;}
}

@keyframes rotateIn{
from{transform:rotate(360deg);opacity:0;}
to{transform:rotate(0);opacity:1;}
}
</style>
</head>

<body>

<h2>Rectangle Typography Generator</h2>

<div class="controls">
<input type="text" id="userText" placeholder="Enter Text">
<select id="animationType">
<option value="fadeIn">Fade In</option>
<option value="slideUp">Slide Up</option>
<option value="zoomIn">Zoom In</option>
<option value="rotateIn">Rotate In</option>
</select>
<button onclick="generate()">Generate</button>
</div>

<!-- Rectangle Area -->
<div id="videoBox">
<div id="animatedText"></div>
</div>

<script>
function generate(){

let text=document.getElementById("userText").value;
let animation=document.getElementById("animationType").value;
let output=document.getElementById("animatedText");

output.className=""; 
output.innerText=text;
output.style.opacity="0";

/* Restart animation */
void output.offsetWidth;

output.classList.add(animation);

}
</script>

</body>
</html>
