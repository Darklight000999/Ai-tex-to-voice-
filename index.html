<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Pro Text Editor</title>

<style>
body{
  background:#111;
  color:white;
  font-family:system-ui,"Segoe UI Emoji","Apple Color Emoji",sans-serif;
  margin:0; padding:20px; text-align:center;
}
h2{margin-bottom:20px;}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-bottom:20px;
}

input,select,button,textarea{
  padding:8px;
  font-size:14px;
  border-radius:8px;
  border:none;
}

textarea{
  width:200px;
  height:60px;
  resize:none;
}

button{
  background:#00ffff;
  cursor:pointer;
  font-weight:bold;
}

#videoBox{
  width:900px;
  height:400px;
  margin:auto;
  background:#000;
  border-radius:15px;
  position:relative;
  overflow:hidden;
}

.textLayer{
  position:absolute;
  font-weight:bold;
  white-space:pre-wrap;
  cursor:move;
}

/* ================== ANIMATIONS ================== */

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes fadeOut{to{opacity:0;}}
@keyframes slideUp{from{transform:translateY(100px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes slideDown{to{transform:translateY(100px);opacity:0;}}
@keyframes zoomIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes zoomOut{to{transform:scale(0);opacity:0;}to{opacity:0;}}

.fadeIn{animation:fadeIn 1s forwards;}
.fadeOut{animation:fadeOut 1s forwards;}
.slideUp{animation:slideUp 1s forwards;}
.slideDown{animation:slideDown 1s forwards;}
.zoomIn{animation:zoomIn 1s forwards;}
.zoomOut{animation:zoomOut 1s forwards;}

/* ================== 10 TEXT STYLES ================== */

.neon{
  text-shadow:0 0 5px #fff,
              0 0 10px #0ff,
              0 0 20px #0ff,
              0 0 40px #0ff;
}

.fire{
  text-shadow:0 0 5px #ff0000,
              0 0 10px #ff4500,
              0 0 20px #ff9900,
              0 0 40px #ff0000;
}

.electric{
  text-shadow:0 0 5px #00f,
              0 0 15px #00f,
              0 0 30px #00ffff;
}

.pinkshine{
  text-shadow:0 0 10px #ff00ff,
              0 0 20px #ff1493,
              0 0 40px #ff00ff;
}

.gold{
  color:gold;
  text-shadow:0 0 5px #ffd700,
              0 0 20px #ffaa00;
}

.threed{
  text-shadow:2px 2px 0 #000,
              4px 4px 5px rgba(0,0,0,0.5);
}

.rainbow{
  background:linear-gradient(90deg,red,orange,yellow,green,blue,indigo,violet);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.glass{
  color:white;
  text-shadow:0 0 10px rgba(255,255,255,0.8);
}

.horror{
  color:red;
  text-shadow:0 0 5px black,
              0 0 20px darkred;
}

.softglow{
  text-shadow:0 0 8px #ffffff,
              0 0 15px #cccccc;
}

.timeline{
  width:900px;
  margin:20px auto;
}

.timeline input[type=range]{
  width:100%;
}

.layer-control{
  margin:5px;
}

</style>
</head>
<body>

<h2>🎬 Ultimate Mini CapCut Text Editor</h2>

<div class="controls">
<textarea id="textInput" placeholder="Enter Text 😄"></textarea>
<input type="number" id="fontSize" value="60">
<select id="fontFamily">
<option>Arial</option>
<option>Impact</option>
<option>Courier New</option>
<option>Georgia</option>
<option>Verdana</option>
</select>
<input type="color" id="textColor" value="#00ffff">
<input type="number" id="posX" value="100">
<input type="number" id="posY" value="150">

<select id="inAnimation">
<option value="fadeIn">Fade In</option>
<option value="slideUp">Slide Up</option>
<option value="zoomIn">Zoom In</option>
</select>

<select id="outAnimation">
<option value="fadeOut">Fade Out</option>
<option value="slideDown">Slide Down</option>
<option value="zoomOut">Zoom Out</option>
</select>

<select id="textStyle">
<option value="">Normal</option>
<option value="neon">Neon</option>
<option value="fire">Fire</option>
<option value="electric">Electric</option>
<option value="pinkshine">Pink Shine</option>
<option value="gold">Gold</option>
<option value="threed">3D</option>
<option value="rainbow">Rainbow</option>
<option value="glass">Glass</option>
<option value="horror">Horror</option>
<option value="softglow">Soft Glow</option>
</select>

<input type="number" id="duration" value="3" min="1">
<button onclick="addLayer()">Add Layer</button>
<button onclick="playPreview()">Play Preview</button>
</div>

<div id="layerList"></div>
<div id="videoBox"></div>

<div class="timeline">
<label>🎛 Timeline</label>
<input type="range" id="timelineSlider" min="0" max="100" value="0">
</div>

<script>
let layers=[];
let interval;

function addLayer(){
  let l={
    text:textInput.value,
    fontSize:fontSize.value,
    fontFamily:fontFamily.value,
    textColor:textColor.value,
    posX:parseInt(posX.value),
    posY:parseInt(posY.value),
    inAnim:inAnimation.value,
    outAnim:outAnimation.value,
    duration:parseInt(duration.value),
    style:textStyle.value
  };
  layers.push(l);
  renderLayerList();
}

function renderLayerList(){
  layerList.innerHTML="";
  layers.forEach((l,i)=>{
    layerList.innerHTML+=`<div class="layer-control">
      ${i+1}: ${l.text}
      <button onclick="removeLayer(${i})">❌</button>
    </div>`;
  });
}

function removeLayer(i){
  layers.splice(i,1);
  renderLayerList();
}

function playPreview(){
  clearInterval(interval);
  videoBox.innerHTML="";
  timelineSlider.value=0;

  let totalTime=layers.reduce((sum,l)=>sum+l.duration,0)*1000;
  let currentTime=0;
  let index=0;

  function showLayer(){
    if(index>=layers.length) return;

    let l=layers[index];
    let div=document.createElement("div");

    div.className="textLayer "+l.style+" "+l.inAnim;
    div.innerText=l.text;
    div.style.fontSize=l.fontSize+"px";
    div.style.fontFamily=l.fontFamily;
    div.style.color=l.textColor;
    div.style.left=l.posX+"px";
    div.style.top=l.posY+"px";

    videoBox.appendChild(div);

    setTimeout(()=>{
      div.classList.remove(l.inAnim);
      div.classList.add(l.outAnim);
    },l.duration*1000);

    setTimeout(()=>{
      videoBox.removeChild(div);
      index++;
      showLayer();
    },(l.duration+1)*1000);
  }

  showLayer();

  interval=setInterval(()=>{
    currentTime+=100;
    timelineSlider.value=(currentTime/totalTime)*100;
    if(currentTime>=totalTime) clearInterval(interval);
  },100);
}
</script>

</body>
</html>
