<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Pro Text Editor</title>
<style>
body{
  background:#111;
  color:white;
  font-family:system-ui,"Segoe UI Emoji","Apple Color Emoji",sans-serif;
  margin:0; padding:20px; text-align:center;
}
h2{margin-bottom:20px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:20px;}
input,select,button,textarea{padding:8px;font-size:14px;}
textarea{width:200px;height:60px;resize:none;}
#videoBox{width:900px;height:400px;margin:auto;background:#000;border-radius:15px;position:relative;overflow:hidden;}
.textLayer{position:absolute;font-weight:bold;white-space:pre-wrap;opacity:0;cursor:move;}
.glow{text-shadow:0 0 10px var(--shadowColor),0 0 20px var(--shadowColor),0 0 40px var(--shadowColor);}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes fadeOut{to{opacity:0;}}
@keyframes slideUp{from{transform:translateY(100px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes slideDown{to{transform:translateY(100px);opacity:0;}}
@keyframes zoomIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes zoomOut{to{transform:scale(0);opacity:0;}}
.fadeIn{animation:fadeIn 1s forwards;}
.fadeOut{animation:fadeOut 1s forwards;}
.slideUp{animation:slideUp 1s forwards;}
.slideDown{animation:slideDown 1s forwards;}
.zoomIn{animation:zoomIn 1s forwards;}
.zoomOut{animation:zoomOut 1s forwards;}
.timeline{width:900px;margin:20px auto;}
.timeline input[type=range]{width:100%;}
.layer-control{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:10px;}
</style>
</head>
<body>

<h2>🎬 Ultimate Mini CapCut Text Editor</h2>

<div class="controls">
<textarea id="textInput" placeholder="Enter Text 😄"></textarea>
<input type="number" id="fontSize" value="60" placeholder="Font Size">
<select id="fontFamily">
<option value="Arial">Arial</option>
<option value="Impact">Impact</option>
<option value="Courier New">Courier</option>
<option value="Georgia">Georgia</option>
<option value="Verdana">Verdana</option>
</select>
<input type="color" id="textColor" value="#00ffff">
<input type="color" id="shadowColor" value="#00ffff">
<input type="number" id="posX" value="0" placeholder="X Position">
<input type="number" id="posY" value="0" placeholder="Y Position">
<select id="inAnimation">
<option value="fadeIn">Fade In</option>
<option value="slideUp">Slide Up</option>
<option value="zoomIn">Zoom In</option>
</select>
<select id="outAnimation">
<option value="fadeOut">Fade Out</option>
<option value="slideDown">Slide Down</option>
<option value="zoomOut">Zoom Out</option>
</select>
<input type="number" id="duration" value="3" min="1" placeholder="Duration(s)">
<button onclick="addLayer()">Add Layer</button>
<button onclick="playPreview()">Play Preview</button>
</div>

<div id="layerList"></div>

<div id="videoBox"></div>

<div class="timeline">
<label>🎛 Timeline</label><br>
<input type="range" id="timelineSlider" min="0" max="100" value="0">
</div>

<script>
let layers=[];
let interval;

function addLayer(){
  let l={
    text: document.getElementById("textInput").value,
    fontSize: document.getElementById("fontSize").value,
    fontFamily: document.getElementById("fontFamily").value,
    textColor: document.getElementById("textColor").value,
    shadowColor: document.getElementById("shadowColor").value,
    posX: parseInt(document.getElementById("posX").value),
    posY: parseInt(document.getElementById("posY").value),
    inAnim: document.getElementById("inAnimation").value,
    outAnim: document.getElementById("outAnimation").value,
    duration: parseInt(document.getElementById("duration").value)
  };
  layers.push(l);
  renderLayerList();
}

function renderLayerList(){
  let list=document.getElementById("layerList");
  list.innerHTML="";
  layers.forEach((l,i)=>{
    let div=document.createElement("div");
    div.className="layer-control";
    div.innerHTML=`${i+1}: ${l.text} <button onclick="removeLayer(${i})">❌</button>`;
    list.appendChild(div);
  });
}

function removeLayer(i){ layers.splice(i,1); renderLayerList(); }

function playPreview(){
  clearInterval(interval);
  let box=document.getElementById("videoBox");
  let slider=document.getElementById("timelineSlider");
  box.innerHTML="";
  slider.value=0;
  let totalTime=layers.reduce((sum,l)=>sum+l.duration,0)*1000;
  let currentTime=0;
  let index=0;

  function showLayer(){
    if(index>=layers.length) return;
    let l=layers[index];
    let div=document.createElement("div");
    div.className="textLayer glow "+l.inAnim;
    div.innerText=l.text;
    div.style.fontSize=l.fontSize+"px";
    div.style.fontFamily=l.fontFamily;
    div.style.color=l.textColor;
    div.style.setProperty('--shadowColor',l.shadowColor);
    div.style.left=l.posX+"px";
    div.style.top=l.posY+"px";
    div.style.opacity="1";
    box.appendChild(div);

    setTimeout(()=>{
      div.classList.remove(l.inAnim);
      div.classList.add(l.outAnim);
    },l.duration*1000);

    setTimeout(()=>{
      box.removeChild(div);
      index++;
      showLayer();
    },(l.duration+1)*1000);
  }

  showLayer();

  interval=setInterval(()=>{
    currentTime+=100;
    slider.value=(currentTime/totalTime)*100;
    if(currentTime>=totalTime) clearInterval(interval);
  },100);
}
</script>

</body>
</html>
