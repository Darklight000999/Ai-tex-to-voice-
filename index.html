<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Battle Ultimate Editor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:linear-gradient(135deg,#141e30,#243b55);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.app{
width:95%;
max-width:1300px;
height:92vh;
display:flex;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 50px rgba(0,0,0,0.7);
}

/* SIDEBAR */
.sidebar{
width:340px;
background:rgba(0,0,0,0.65);
padding:20px;
overflow-y:auto;
}

.sidebar h2{
margin-bottom:15px;
color:cyan;
}

.sidebar input,
.sidebar select,
.sidebar textarea{
width:100%;
margin-bottom:10px;
padding:8px;
border-radius:8px;
border:none;
background:#111;
color:white;
}

.sidebar textarea{height:60px;}

.btn{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,cyan,blue);
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(0,255,255,0.5);
}

/* STAGE */
.stage-container{
flex:1;
background:black;
display:flex;
justify-content:center;
align-items:center;
}

#stage{
width:92%;
height:88%;
background:black;
border-radius:20px;
position:relative;
overflow:hidden;
transition:0.5s;
}

.layer{
position:absolute;
font-weight:bold;
text-align:center;
}

/* Glow */
.glow{
text-shadow:
0 0 5px var(--glowColor),
0 0 15px var(--glowColor),
0 0 30px var(--glowColor),
0 0 60px var(--glowColor);
}

/* Animations */

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}

@keyframes slideIn{from{transform:translate(-150%,-50%)}to{transform:translate(-50%,-50%)}}
@keyframes slideOut{from{transform:translate(-50%,-50%)}to{transform:translate(150%,-50%)}}

@keyframes zoomIn{from{transform:translate(-50%,-50%) scale(0)}to{transform:translate(-50%,-50%) scale(1)}}
@keyframes zoomOut{from{transform:translate(-50%,-50%) scale(1)}to{transform:translate(-50%,-50%) scale(0)}}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<h2>AI Ultimate Editor</h2>

<textarea id="text" placeholder="Enter Text"></textarea>

<input type="number" id="size" value="60">
<input type="color" id="color" value="#00ffff">

<select id="inAnim">
<option value="fadeIn">Fade In</option>
<option value="slideIn">Slide In</option>
<option value="zoomIn">Zoom In</option>
</select>

<select id="outAnim">
<option value="fadeOut">Fade Out</option>
<option value="slideOut">Slide Out</option>
<option value="zoomOut">Zoom Out</option>
</select>

<label>In Duration</label>
<input type="number" id="inDur" value="1" step="0.5">

<label>Stay Time</label>
<input type="number" id="stay" value="3">

<label>Out Duration</label>
<input type="number" id="outDur" value="1" step="0.5">

<label>Glow</label>
<select id="glowToggle">
<option value="off">OFF</option>
<option value="on">ON</option>
</select>

<input type="color" id="glowColor" value="#ff0000">

<label>Background Color</label>
<input type="color" id="bgColor" value="#000000">

<label>Gradient Background</label>
<select id="bgGradient">
<option value="none">None</option>
<option value="purple">Purple</option>
<option value="sunset">Sunset</option>
<option value="ocean">Ocean</option>
</select>

<button class="btn" onclick="addLayer()">Add Layer</button>
<button class="btn" onclick="playSequence()">▶ Play</button>
<button class="btn" onclick="stopSequence()">⏹ Stop</button>

</div>

<div class="stage-container">
<div id="stage"></div>
</div>

</div>

<script>

let layers=[];
let index=0;
let playing=false;

function addLayer(){
layers.push({
text:text.value,
size:size.value,
color:color.value,
inAnim:inAnim.value,
outAnim:outAnim.value,
inDur:parseFloat(inDur.value),
stay:parseFloat(stay.value),
outDur:parseFloat(outDur.value),
glow:glowToggle.value,
glowColor:glowColor.value
});
alert("Layer Added ✅ Total: "+layers.length);
}

function playSequence(){
if(layers.length===0){alert("Add Layer First");return;}
applyBackground();
playing=true;
index=0;
showLayer();
}

function showLayer(){
if(!playing) return;

if(index>=layers.length){index=0;}

let l=layers[index];
let stage=document.getElementById("stage");
stage.innerHTML="";

let div=document.createElement("div");
div.className="layer";
div.innerText=l.text;
div.style.fontSize=l.size+"px";
div.style.color=l.color;
div.style.left="50%";
div.style.top="50%";
div.style.transform="translate(-50%,-50%)";

if(l.glow==="on"){
div.classList.add("glow");
div.style.setProperty("--glowColor",l.glowColor);
}

div.style.animation=l.inAnim+" "+l.inDur+"s forwards";
stage.appendChild(div);

setTimeout(()=>{
div.style.animation=l.outAnim+" "+l.outDur+"s forwards";
},(l.inDur+l.stay)*1000);

setTimeout(()=>{
index++;
showLayer();
},(l.inDur+l.stay+l.outDur)*1000);
}

function stopSequence(){
playing=false;
stage.innerHTML="";
}

function applyBackground(){
let stage=document.getElementById("stage");
let color=document.getElementById("bgColor").value;
let gradient=document.getElementById("bgGradient").value;

if(gradient==="none"){
stage.style.background=color;
}
if(gradient==="purple"){
stage.style.background="linear-gradient(45deg,#41295a,#2F0743)";
}
if(gradient==="sunset"){
stage.style.background="linear-gradient(45deg,#ff512f,#dd2476)";
}
if(gradient==="ocean"){
stage.style.background="linear-gradient(45deg,#2193b0,#6dd5ed)";
}
}

</script>

</body>
</html>
