<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>Hyper Realistic Hindi AI Voice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🎙 Hyper Realistic Hindi AI Voice</h1>
    
    <textarea id="text" placeholder="यहाँ अपना टेक्स्ट लिखें...">
नमस्ते दोस्तों, यह मेरी एआई हाइपर रियलिस्टिक वॉयस है।
    </textarea>

    <div class="controls">
      <label>Speed</label>
      <input type="range" id="speed" min="0.5" max="1.5" step="0.1" value="1">

      <label>Pitch</label>
      <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
    </div>

    <button onclick="speak()">Generate Voice</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
